<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Sadad Payment</title>
</head>
<body>

<h2>💳 الدفع عبر Sadad</h2>

<input id="phone" placeholder="رقم الهاتف 09xxxxxxxx">
<input id="birth" placeholder="سنة الميلاد 1995">
<button onclick="start()">إرسال OTP</button>

<br><br>

<input id="otp" placeholder="OTP">
<button onclick="confirmPay()">تأكيد الدفع</button>

<script>
let process_id = null;

async function start() {
  const phone = document.getElementById("phone").value;
  const birth = document.getElementById("birth").value;

  const res = await fetch("/api/verify", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      phone: phone,
      birth_year: birth
    })
  });

  const data = await res.json();
  console.log(data);

  if (data.result) {
    process_id = data.result.process_id;
    alert("✅ تم إرسال OTP");
  } else {
    alert("❌ خطأ: " + data.error?.message);
  }
}

async function confirmPay() {
  const otp = document.getElementById("otp").value;

  const res = await fetch("/api/confirm", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      process_id: process_id,
      code: otp
    })
  });

  const data = await res.json();
  console.log(data);

  alert(data.message);
}
</script>

</body>
</html>
