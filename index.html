<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Plutu | بوابة الدفع المتكاملة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2160FD;
      --primary-hover: #1A4ED4;
      --secondary: #0A1C3C;
      --accent: #00F0FF;
      --bg-dark: #050B14;
      --card-bg: rgba(16, 28, 56, 0.6);
      --card-border: rgba(255, 255, 255, 0.1);
      --text-main: #FFFFFF;
      --text-muted: #94A3B8;
      --danger: #EF4444;
      --success: #10B981;
      --gold: #FACC15;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Tajawal', 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(33, 96, 253, 0.15), transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(0, 240, 255, 0.1), transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 1), var(--bg-dark));
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Test Mode Banner */
    .test-mode-badge {
      position: fixed;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, var(--gold), #CA8A04);
      color: #000;
      padding: 0.5rem 1rem;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 15px rgba(250, 204, 21, 0.3);
      z-index: 100;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .test-mode-badge span {
      width: 8px;
      height: 8px;
      background: #000;
      border-radius: 50%;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Background Animation Elements */
    .bg-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: var(--primary);
      filter: blur(150px);
      opacity: 0.2;
      border-radius: 50%;
      top: -100px;
      right: -100px;
      animation: pulseGlow 8s infinite alternate ease-in-out;
      z-index: -1;
    }

    @keyframes pulseGlow {
      0% { transform: scale(1); opacity: 0.15; }
      100% { transform: scale(1.2); opacity: 0.25; }
    }

    /* Main Container */
    .payment-container {
      width: 100%;
      max-width: 520px;
      perspective: 1000px;
      z-index: 10;
    }

    .payment-card {
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .logo-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1E3A8A, var(--primary));
      border-radius: 18px;
      margin-bottom: 1rem;
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .logo-container svg {
      width: 32px;
      height: 32px;
      fill: none;
      stroke: white;
      stroke-width: 2;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, #FFFFFF, #B0C4DE);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Methods Grid */
    .methods-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin-bottom: 2rem;
    }

    .method-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 0.9rem 0.4rem;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      text-align: center;
    }

    .method-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; }
    .method-btn:hover { background: rgba(255, 255, 255, 0.06); }
    .method-btn.active {
      background: rgba(33, 96, 253, 0.1);
      border-color: var(--primary);
      color: var(--text-main);
      box-shadow: 0 4px 15px rgba(33, 96, 253, 0.2);
    }

    /* Input Groups */
    .input-group {
      margin-bottom: 1.25rem;
      transition: all 0.3s ease;
    }

    .input-group.hidden { display: none; }

    .input-group label {
      display: block;
      color: #E2E8F0;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .input-wrapper { position: relative; }

    .input-wrapper svg {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 1.5;
    }

    .input-field {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      padding: 1rem 1rem 1rem 2.8rem;
      color: var(--text-main);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-field:focus {
      border-color: var(--primary);
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 0 4px rgba(33, 96, 253, 0.1);
    }

    /* Buttons */
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--primary), #4338CA);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 1rem;
    }

    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(33, 96, 253, 0.3); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* OTP Section */
    .otp-section {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px dashed rgba(255, 255, 255, 0.15);
    }

    /* Alert Message */
    .message-box {
      margin-top: 1.25rem;
      padding: 0.9rem;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .message-box.show { display: flex; }
    .message-box.error { background: rgba(239, 68, 68, 0.1); color: #F87171; border-right: 3px solid var(--danger); }
    .message-box.success { background: rgba(16, 185, 129, 0.1); color: #34D399; border-right: 3px solid var(--success); }
    .message-box.info { background: rgba(56, 189, 248, 0.1); color: #7DD3FC; border-right: 3px solid #38BDF8; }

    /* Status Overlay */
    .status-overlay {
      position: absolute;
      inset: 0;
      background: var(--bg-dark);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .hidden { display: none !important; }

    /* Footer */
    .footer { margin-top: 2rem; font-size: 0.7rem; color: var(--text-muted); display: flex; align-items: center; gap: 5px; opacity: 0.7; }

    @media (max-width: 480px) {
      .methods-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="test-mode-badge">
  <span></span> وضع التجربة مفعّل
</div>

<div class="payment-container">
  <div class="payment-card">
    
    <!-- Status Overlays -->
    <div id="successOverlay" class="status-overlay hidden">
      <div style="background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 20px; border-radius: 50%; margin-bottom: 1.5rem;">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;">تمت العملية بنجاح</h2>
      <p style="color: var(--text-muted); margin-bottom: 2rem;">نشكرك على اختيارك بوابة Plutu.</p>
      <button class="btn-submit" onclick="window.location.href='index.html'" style="max-width: 200px;">إغلاق</button>
    </div>

    <!-- Header -->
    <div class="header">
      <div class="logo-container">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
      </div>
      <h1>Plutu Checkout</h1>
      <p>بوابة دفع ذكية آمنة وسريعة</p>
    </div>

    <!-- Grid -->
    <div class="methods-grid">
      <button class="method-btn active" data-method="edfali">
        <svg viewBox="0 0 24 24"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4M3 5v14a2 2 0 0 0 2 2h16v-5M18 12a2 2 0 0 0 0 4h4v-4h-4z"/></svg>
        Adfali
      </button>
      <button class="method-btn" data-method="sadad">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
        Sadad
      </button>
      <button class="method-btn" data-method="tlync">
        <svg viewBox="0 0 24 24"><path d="M2 12h4l3-9 5 18 3-9h5"/></svg>
        T-Lync
      </button>
      <button class="method-btn" data-method="localbankcards">
        <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2" ry="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        Local
      </button>
      <button class="method-btn" data-method="mpgs">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
        MPGS
      </button>
    </div>

    <!-- Form -->
    <div class="form-container">
      <div class="input-group" id="phoneGroup">
        <label>رقم الجوال</label>
        <div class="input-wrapper">
          <input type="tel" id="phone" class="input-field" placeholder="09xxxxxxxx" maxlength="10">
          <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72"/></svg>
        </div>
      </div>

      <div class="input-group hidden" id="birthYearGroup">
        <label>سنة الميلاد</label>
        <div class="input-wrapper">
          <input type="number" id="birth_year" class="input-field" placeholder="19xx" maxlength="4">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
      </div>

      <div class="input-group">
        <label id="amountLabel">المبلغ (LYD)</label>
        <div class="input-wrapper">
          <input type="number" id="amount" class="input-field" placeholder="0.00" step="0.1">
          <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
      </div>

      <button id="mainBtn" class="btn-submit">
        <span>إرسال رمز التحقق</span>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>

      <div id="otpSection" class="otp-section hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
          <label style="font-size: 0.85rem; font-weight: 600;">رمز التحقق (OTP)</label>
          <button id="resendBtn" style="background: none; border: none; color: var(--accent); font-size: 0.75rem; cursor: pointer;">إعادة إرسال</button>
        </div>
        <input type="text" id="otp" class="input-field" placeholder="••••••" style="text-align: center; letter-spacing: 4px;">
        <button id="confirmBtn" class="btn-submit" style="background: linear-gradient(135deg, #10B981, #059669); margin-top: 1rem;">تأكيد الدفع</button>
      </div>

      <div id="messageBox" class="message-box"></div>
    </div>
  </div>

  <div class="footer">
    <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    تشفير آمن مدعوم من Plutu.ly
  </div>
</div>

<script>
  let state = { method: 'edfali', processId: null, amount: null, phone: null, isProcessing: false };

  const els = {
    methodBtns: document.querySelectorAll('.method-btn'),
    phoneGroup: document.getElementById('phoneGroup'),
    birthYearGroup: document.getElementById('birthYearGroup'),
    phoneInput: document.getElementById('phone'),
    birthYearInput: document.getElementById('birth_year'),
    amountInput: document.getElementById('amount'),
    amountLabel: document.getElementById('amountLabel'),
    mainBtn: document.getElementById('mainBtn'),
    otpSection: document.getElementById('otpSection'),
    otpInput: document.getElementById('otp'),
    confirmBtn: document.getElementById('confirmBtn'),
    resendBtn: document.getElementById('resendBtn'),
    messageBox: document.getElementById('messageBox'),
  };

  els.methodBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      els.methodBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.method = btn.dataset.method;
      
      const requiresPhone = ['edfali', 'tlync', 'sadad'].includes(state.method);
      els.phoneGroup.style.display = requiresPhone ? 'block' : 'none';
      els.birthYearGroup.classList.toggle('hidden', state.method !== 'sadad');
      
      els.amountLabel.innerText = state.method === 'mpgs' ? 'المبلغ (USD)' : 'المبلغ (LYD)';
      els.mainBtn.querySelector('span').innerText = ['edfali', 'sadad'].includes(state.method) ? 'إرسال رمز التحقق' : 'متابعة الدفع';
      
      // Auto-fill test values for convenience if phone is empty
      if (requiresPhone && els.phoneInput.value === '') {
        els.phoneInput.placeholder = "0913632323 (Test)";
      }
      
      resetOTP();
    });
  });

  const showMsg = (txt, type) => {
    els.messageBox.className = `message-box show ${type}`;
    els.messageBox.innerText = txt;
  };

  const resetOTP = () => {
    els.otpSection.classList.add('hidden');
    els.otpInput.value = '';
    state.processId = null;
    els.messageBox.classList.remove('show');
  };

  els.mainBtn.addEventListener('click', async () => {
    if (state.isProcessing) return;
    
    const phone = els.phoneInput.value.trim();
    const amount = els.amountInput.value.trim();
    const birth_year = els.birthYearInput.value.trim();

    if (['edfali', 'tlync', 'sadad'].includes(state.method) && !/^09\d{8}$/.test(phone)) return showMsg('رقم الجوال غير صحيح', 'error');
    if (state.method === 'sadad' && birth_year.length !== 4) return showMsg('يرجى إدخال سنة الميلاد', 'error');
    if (!amount || amount <= 0) return showMsg('يرجى إدخال مبلغ صحيح', 'error');

    state.isProcessing = true;
    els.mainBtn.disabled = true;
    showMsg('جاري المعالجة...', 'info');

    try {
      if (['edfali', 'sadad'].includes(state.method)) {
        const res = await fetch(`/api/${state.method === 'sadad' ? 'sadad' : 'verify'}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, amount, birth_year })
        });
        const data = await res.json();
        if (data.status === 200) {
          state.processId = data.result.process_id || data.result.transaction_id;
          state.phone = phone;
          state.amount = amount;
          els.otpSection.classList.remove('hidden');
          els.otpInput.placeholder = state.method === 'sadad' ? '111111' : '1111';
          showMsg('تم إرسال الرمز بنجاح', 'success');
        } else {
          showMsg(data.message || 'فشل إرسال الرمز', 'error');
        }
      } else {
        const res = await fetch(`/api/${state.method}-confirm`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount, mobile_number: phone })
        });
        const data = await res.json();
        if (data.status === 200 && data.result.redirect_url) {
          window.location.href = data.result.redirect_url;
        } else {
          showMsg('تعذر التوجيه لبوابة الدفع', 'error');
        }
      }
    } catch (e) {
      showMsg('خطأ في الاتصال بالخادم', 'error');
    } finally {
      state.isProcessing = false;
      els.mainBtn.disabled = false;
    }
  });

  els.confirmBtn.addEventListener('click', async () => {
    const code = els.otpInput.value.trim();
    if (!code) return showMsg('يرجى إدخال رمز التحقق', 'error');

    state.isProcessing = true;
    els.confirmBtn.disabled = true;
    showMsg('جاري التأكيد...', 'info');

    try {
      const res = await fetch('/api/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ process_id: state.processId, code, amount: state.amount, method: state.method })
      });
      const data = await res.json();
      if (data.status === 200 || (data.data && data.data.status === 200)) {
        document.getElementById('successOverlay').classList.remove('hidden');
      } else {
        showMsg(data.message || 'فشل التأكيد', 'error');
      }
    } catch (e) {
      showMsg('خطأ في الاتصال', 'error');
    } finally {
      state.isProcessing = false;
      els.confirmBtn.disabled = false;
    }
  });
</script>
</body>
</html>
